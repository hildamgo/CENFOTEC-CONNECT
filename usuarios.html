<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Registrar administrador</title>

        <link rel="stylesheet" href="styles.css"
    </head>

<body>
<div class = "page">
    <h1>Registrar administrador</h1>
    <p> Solo el Administrador General puede crear nuevos usuarios en el sistema.</p>
</div>

<!--Aqui empezaría el formulario para no perdernos-->
<div class="seccion">
    <p class="seccion-label">Datos del nuevo administrador</p>

    <!--Aqui el admin podria su nombre, puse el el mío como ejemplo :D-->
    <div class="campo">
        <label for="nombre">Nombre completo<span class="req">*</span></label>
        <input type="text" id="nombre" placeholder="Ej. Paula Porras" maxlength="50" />
        <span class="error-msg" id="err-nombre"></span>
    </div>

    <!--Aqui voy a poner para lo del correo-->
    <div class="campo">
        <label for="correo">Correo electronico <span class="req">*</span></label>
        <input type="email" id="correo" placeholder="correo@ejemplo.com" />
        <span class="error=msg" id="err-correo"></span>
    </div>

    <!--En este espacio se selecciona el rol-->
    <div class="campo">
        <label for="rol">Rol <span class="req">*</span> </label>
        <select id="rol">
            <option value="">Seleccione su rol</option>
            <option value="GA">Administrador General</option>
            <option value="AA">Administrador de actividades</option>
        </select>
        <span class="error-msg" id="err-rol"></span>
    </div>

    <!--Aqui va para la contraseña de los admins-->
    <div class="grid-2">

        <div class="campo">
            <label for="password">Contraseña <span class="req">*</span></label>
            <input type="password" id="password" placeholder="Minimo 8 caracteres" maxlength="64" />
            <span class="error-msg" id="err-confirmar"></span>
        </div>
    </div>

    <!--Y aqui se van a poner los botoncitos de acciones para el formulario-->

    <div class="acciones">
        <button class="btn-secundario" onclick="limpiarFormulario()">Limpiar</button>
        <button class="btn-primario" onclick="guardarAdmin()">Registrar al administrador</button>
    </div>
</div>

</body>
</html>
