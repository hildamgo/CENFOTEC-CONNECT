<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cenfotec Connect — Administración</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header" role="banner">
    <div class="header-inner">
      <div class="brand">
        <imges src = "assets/Images/Logo Oficial.jpeg" alt="Logo CENFOTEC Connect" class="logo" />
        <div>
          <h1 class="site-title">CENFOTEC Connect</h1>
          <p class="site-subtitle">Gestión de actividades y recursos</p>
        </div>
      </div>

      <nav class="main-nav" role="navigation" aria-label="Navegación principal">
        <button id="nav-dashboard" class="nav-btn" aria-controls="view">Panel</button>
        <button id="nav-spaces" class="nav-btn" aria-controls="view">Gestión de Espacios</button>
        <button id="nav-responsibles" class="nav-btn" aria-controls="view">Gestión de Responsables</button>
        <button id="nav-activities" class="nav-btn" aria-controls="view">Gestión de Actividades</button>
        <button id="nav-users" class="nav-btn" aria-controls="view">Gestión de Usuarios</button>
      </nav>
    </div>
  </header>

  <main id="app" role="main" aria-live="polite">
    <!-- Vistas inyectadas dinámicamente -->
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <div>Universidad CENFOTEC — CENFOTEC Connect</div>
      <div class="footer-right">Contacto: soporte@cenfotec.ac.cr</div>
    </div>
  </footer>

  <!-- Plantillas de vistas -->
  <template id="tpl-dashboard">
    <section class="view" aria-labelledby="title-dashboard">
      <h2 id="title-dashboard">Panel Principal</h2>
      <div class="card">
        <p>Resumen rápido del sistema.</p>
        <ul id="dashboard-stats" class="stats-list">
          <li>Actividades: <strong id="stat-activities">—</strong></li>
          <li>Espacios: <strong id="stat-spaces">—</strong></li>
          <li>Responsables: <strong id="stat-responsibles">—</strong></li>
        </ul>
      </div>
    </section>
  </template>

  <template id="tpl-spaces">
    <section class="view" aria-labelledby="title-spaces">
      <h2 id="title-spaces">Gestión de Espacios</h2>

      <div class="card">
        <h3>Registrar Espacio</h3>
        <div id="msg-spaces" class="msg error" role="status" aria-live="polite"></div>
        <form id="spaceForm" class="form" novalidate>
          <label>Nombre
            <input id="name" name="name" required autocomplete="off" />
          </label>
          <label>Sede
            <input id="campus" name="campus" required autocomplete="off" />
          </label>
          <label>Descripción
            <textarea id="description" name="description" rows="3"></textarea>
          </label>
          <div class="form-actions">
            <button type="submit" class="btn primary">Guardar</button>
            <button type="button" id="reset-space" class="btn">Limpiar</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h3>Listado de Espacios</h3>
        <table id="spacesTable" class="table" aria-describedby="spaces-desc">
          <caption id="spaces-desc">Lista de espacios registrados</caption>
          <thead><tr><th>Nombre</th><th>Sede</th><th>Descripción</th><th>Acciones</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="tpl-responsibles">
    <section class="view" aria-labelledby="title-resp">
      <h2 id="title-resp">Gestión de Responsables</h2>

      <div class="card">
        <h3>Registrar Responsable</h3>
        <div id="msg-resp" class="msg error" role="status" aria-live="polite"></div>
        <form id="respForm" class="form" novalidate>
          <label>Identificación
            <input id="identification" name="identification" required autocomplete="off" />
          </label>
          <label>Nombre
            <input id="firstName" name="firstName" required autocomplete="off" />
          </label>
          <label>Apellido
            <input id="lastName" name="lastName" required autocomplete="off" />
          </label>
          <label>Correo
            <input id="email" name="email" type="email" required autocomplete="off" />
          </label>
          <label>Teléfono (separar por coma)
            <input id="phones" name="phones" required autocomplete="off" />
          </label>
          <label>Especialidad
            <input id="specialty" name="specialty" autocomplete="off" />
          </label>
          <label>Institución
            <input id="institution" name="institution" autocomplete="off" />
          </label>
          <label>Biografía
            <textarea id="biography" name="biography" rows="3"></textarea>
          </label>
          <div class="form-actions">
            <button type="submit" class="btn primary">Guardar</button>
            <button type="button" id="reset-resp" class="btn">Limpiar</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h3>Listado de Responsables</h3>
        <table id="listTable" class="table" aria-describedby="resp-desc">
          <caption id="resp-desc">Lista de responsables registrados</caption>
          <thead><tr><th>Identificación</th><th>Nombre</th><th>Correo</th><th>Teléfonos</th><th>Acciones</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="tpl-activities">
    <section class="view" aria-labelledby="title-activities">
      <h2 id="title-activities">Gestión de Actividades</h2>
      <div class="card">
        <p>Módulo integrado con Espacios y Responsables. Implementación posterior.</p>
      </div>
    </section>
  </template>

  <template id="tpl-users">
    <section class="view" aria-labelledby="title-users">
      <h2 id="title-users">Gestión de Usuarios</h2>
      <div class="card">
        <p>Módulo de administración de administradores. Implementación posterior.</p>
      </div>
    </section>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
