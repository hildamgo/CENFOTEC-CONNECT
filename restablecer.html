<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title> Restablecer contraseña</title>
        <link rel="stylesheet" href="styles.css" />
    </head>


    <body>
        <div class="page-login">
            <div class="login-card">

                <!--Para poner primero el correo-->

                <div id="paso-correo">

                    <div class="login-header">
                        <h1>Restablecer contraseña</h1>
                        <p>Ingrese su correo y le enviaremos las instrucciones para reestablecer su contraseña </p>
                    </div>

                    <div class="campo">
                        <label for="correo-reset">Correo electronico <span class="req">*</span></label>
                        <input type="email" id="correo-reset" placeholder="correo@ejemplo.com" />
                        <span class="error-msg" id="err-correo-reset"></span>
                    </div>

                    <!--Mandariamos un mensajito de confirmacion-->
                    <div id="msg-confirmacion" class="msg-confirmacion" style="display: none;">
                        Si el correo está registrado, recibirá las imstrucciones en breve.
                    </div>

                    <div class="acciones" style="justify-content: center;">
                        <button class="btn-primario" style="width: 100%;" onclick="solicitarReset()">
                            Enviar instrucciones
                        </button>
                    </div>

                    <div style="text-align: center; margin-top: 8px;">
                        <a href="login.html" class="enlace-olvide">Volver al inicio</a>
                    </div>

                    <!-- en este caso, ya en esta parte hariamos el paso para la nueva contraseña-->

                    <div id="paso-nueva-password" style="display: none;">

                        <div class="login-header">
                            <h1>Nueva contraseña</h1>
                            <p>Por favor, escriba su nueva contraseña. </p>
                        </div>

                        <div class="campo">
                            <label for="nueva-password">Nueva contraseña <span class="req">*</span></label>
                            <input type="password" id="nueva-password" placeholder="Mínimo 8 caracteres" maxlength="64" />
                            <span class="error-msg" id="err-confirmar-password"></span>
                        </div>

                        <div class="acciones" style="justify-content: center;">
                            <button class="btn-primario" style="width: 100%;" onclick="guardarNuevaPassword()">
                                Guardar nueva contraseña
                            </button>
                        </div>

                    </div>

                </div>

            </div>
            </div>

            <script src="sesion.js"></script>
            <script src="restablecer.js"></script>
    </body>
</html>
