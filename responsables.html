<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cenfotec Connect — Responsables</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="encabezado">
    <div class="contenedor">
        <div class="brand">
          <img src="assets/Images/Logo Oficial.jpeg" alt="Logo CENFOTEC Connect"/>
          <h1>CENFOTEC Connect</h1>
        </div>
    </div>
  </header>

  <nav class="menu">
      <a href="index.html">Inicio</a>
      <a href="usuarios.html">Usuarios</a>
      <a href="actividades.html">Actividades</a>
      <a href="espacios.html">Espacios</a>
      <a href="responsables.html">Responsables</a>
      <a href="participantes.html">Participantes</a>
      <a href="inscripciones.html">Inscripciones</a>
  </nav>

  <main>
    <section class="Seccion">
      <div class="contenedor">
        <h2>Gestión de Responsables</h2>
        <p class="texto-ayuda">Registrar, editar, eliminar y buscar responsables.</p>

        <form id="formResponsable" class="formulario" novalidate>
            <input type="hidden" id="responsableId">

            <label for="identificacion">Identificación *</label>
            <input type="text" id="identificacion" placeholder="Ej: 1-1111-1111">
            <p class="mensaje-error" id="errorIdentificacion"></p>

            <label for="correo">Correo *</label>
            <input type="email" id="correo" placeholder="correo@ejemplo.com">
            <p class="mensaje-error" id="errorCorreo"></p>

            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" placeholder="Nombre">
            <p class="mensaje-error" id="errorNombre"></p>

            <label for="primerApellido">Primer Apellido *</label>
            <input type="text" id="primerApellido" placeholder="Primer Apellido">
            <p class="mensaje-error" id="errorPrimerApellido"></p>

            <label for="segundoApellido">Segundo Apellido *</label>
            <input type="text" id="segundoApellido" placeholder="Segundo Apellido">
            <p class="mensaje-error" id="errorSegundoApellido"></p>

            <label for="telefono">Teléfono *</label>
            <input type="text" id="telefono" placeholder="8888-8888">
            <p class="mensaje-error" id="errorTelefono"></p>

            <label for="especialidad">Especialidad o Profesión *</label>
            <input type="text" id="especialidad" placeholder="Ingeniería, Administración...">
            <p class="mensaje-error" id="errorEspecialidad"></p>

            <label for="institucion">Institución *</label>
            <input type="text" id="institucion" placeholder="Universidad CENFOTEC">
            <p class="mensaje-error" id="errorInstitucion"></p>

            <label for="biografia">Biografía *</label>
            <textarea id="biografia" placeholder="Resumen profesional del responsable"></textarea>
            <p class="mensaje-error" id="errorBiografia"></p>

            <label for="fotografia">Fotografía URL *</label>
            <input type="url" id="fotografia" placeholder="https://ejemplo.com/foto.jpg">
            <p class="mensaje-error" id="errorFotografia"></p>

            <button type="submit">Guardar Responsable</button>
            <button type="button" id="btnLimpiar" class="secundario">Limpiar</button>
        </form>

        <hr>

        <h3>Búsqueda</h3>
        <div class="busqueda">
            <label for="buscarResponsable">Buscar por nombre, identificación, correo o especialidad</label>
            <input type="search" id="buscarResponsable" placeholder="Escribe para buscar...">
        </div>

        <div class="tabla-contenedor">
            <table>
                <thead>
                    <tr>
                        <th>Nombre Completo</th>
                        <th>Identificación</th>
                        <th>Correo</th>
                        <th>Especialidad</th>
                        <th>Fecha de Registro</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaResponsables"></tbody>
            </table>
        </div>

      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 CENFOTEC Connect.</p>
  </footer>

  <script src="js/responsables.js"></script>
</body>
</html>
