<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Participantes — CENFOTEC Connect</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="encabezado">
    <div class="contenedor">
        <h1>CENFOTEC Connect</h1>
    </div>
</header>

<nav class="menu">
    <a href="index.html">Inicio</a>
    <a href="usuarios.html">Usuarios</a>
    <a href="actividades.html">Actividades</a>
    <a href="espacios.html">Espacios</a>
    <a href="responsables.html">Responsables</a>
    <a href="participantes.html">Participantes</a>
    <a href="inscripciones.html">Inscripciones</a>
</nav>

<main>
<section class="Seccion">
<div class="contenedor">

    <h2>Gestión de Participantes</h2>
    <p class="texto-ayuda">Registrar, editar, eliminar, buscar y filtrar participantes.</p>

    <!-- Formulario RF-25, RF-26, RF-27 -->
    <form id="formParticipante" class="formulario" novalidate>

        <input type="hidden" id="participanteId">

        <!-- Nombre -->
        <label for="nombre">Nombre Completo *</label>
        <input type="text" id="nombre" placeholder="Nombre completo">
        <span class="mensaje-error" id="err-nombre"></span>

        <!-- Identificación — inmutable al editar (RF-26) -->
        <label for="identificacion">Identificación *</label>
        <input type="text" id="identificacion" placeholder="Ej: 1-1111-1111">
        <span class="mensaje-error" id="err-identificacion"></span>

        <!-- Correo — inmutable al editar (RF-26) -->
        <label for="correo">Correo Electrónico *</label>
        <input type="email" id="correo" placeholder="correo@ejemplo.com">
        <span class="mensaje-error" id="err-correo"></span>

        <!-- Teléfono -->
        <label for="telefono">Teléfono *</label>
        <input type="tel" id="telefono" placeholder="8888-8888">
        <span class="mensaje-error" id="err-telefono"></span>

        <!-- Edad -->
        <label for="edad">Edad *</label>
        <input type="number" id="edad" min="1" max="120" placeholder="Ej: 22">
        <span class="mensaje-error" id="err-edad"></span>

        <!-- Profesión -->
        <label for="profesion">Profesión / Carrera *</label>
        <input type="text" id="profesion" placeholder="Ingeniería de Software">
        <span class="mensaje-error" id="err-profesion"></span>

        <!-- Actividad opcional — solo visible al registrar (RF-25) -->
        <div id="grupoActividad">
            <label for="actividadOpcional">Actividad (Opcional)</label>
            <select id="actividadOpcional">
                <option value="">— Sin actividad —</option>
            </select>
            <span class="mensaje-error" id="err-actividad"></span>
        </div>

        <!-- Estado -->
        <label for="estado">Estado</label>
        <select id="estado">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
        </select>

        <button type="submit">Guardar Participante</button>
        <button type="button" id="btnLimpiar" class="secundario">Limpiar</button>

    </form>

    <hr>

    <!-- Búsqueda RF-28 -->
    <h3>Búsqueda</h3>
    <div class="busqueda">
        <label for="buscarParticipante">Buscar por nombre, identificación, correo o profesión</label>
        <input type="search" id="buscarParticipante" placeholder="Escribe para buscar...">
    </div>

    <!-- Filtros RF-28 -->
    <h3>Filtros</h3>
    <div class="busqueda">
        <label for="filtroEstado">Estado</label>
        <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
        </select>

        <label for="filtroProfesion">Profesión</label>
        <input type="text" id="filtroProfesion" placeholder="Filtrar por profesión">
    </div>

    <!-- Tabla RF-28 -->
    <div class="tabla-contenedor">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Identificación</th>
                    <th>Correo</th>
                    <th>Teléfono</th>
                    <th>Edad</th>
                    <th>Profesión</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaParticipantes"></tbody>
        </table>
    </div>

</div>
</section>
</main>

<footer>
    <p>&copy; 2026 CENFOTEC Connect.</p>
</footer>

</body>
</html>
