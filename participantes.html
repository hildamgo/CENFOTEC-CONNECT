<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Participantes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="encabezado">
    <div class="contenedor">
        <h1>CENFOTEC Connect</h1>

        <nav class="menu">
            <a href="index.html">Inicio</a>
            <a href="usuarios.html">Usuarios</a>
            <a href="actividades.html">Actividades</a>
            <a href="espacios.html">Lugares</a>
            <a href="responsables.html">Responsables</a>
            <a href="participantes.html">Participantes</a>
            <a href="inscripciones.html">Inscripciones</a>
        </nav>
    </div>
</header>

<main>

<section class="Seccion">
<div class="contenedor">

    <h2>Gestión de Participantes</h2>

    <p class="texto-ayuda">
        Registrar, editar, eliminar y buscar participantes del sistema.
    </p>

    <form id="formParticipante" class="formulario">

        <input type="hidden" id="participanteId">

        <label for="nombre">Nombre Completo</label>
        <input
            type="text"
            id="nombre"
            placeholder="Nombre completo">

        <label for="identificacion">Identificación</label>
        <input
            type="text"
            id="identificacion"
            placeholder="Ej: 1-1111-1111">

        <label for="correo">Correo Electrónico</label>
        <input
            type="email"
            id="correo"
            placeholder="correo@ejemplo.com">

        <label for="telefono">Teléfono</label>
        <input
            type="text"
            id="telefono"
            placeholder="8888-8888">

        <label for="edad">Edad</label>
        <input
            type="number"
            id="edad"
            min="1"
            max="120">

        <label for="profesion">Profesión / Carrera</label>
        <input
            type="text"
            id="profesion"
            placeholder="Ingeniería de Software">

        <label for="estado">Estado</label>
        <select id="estado">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
        </select>

        <button type="submit">
            Guardar Participante
        </button>

        <button
            type="button"
            id="btnLimpiar"
            class="secundario">
            Limpiar
        </button>

    </form>

    <div class="busqueda">

        <label for="buscarParticipante">
            Buscar Participante
        </label>

        <input
            type="search"
            id="buscarParticipante"
            placeholder="Nombre, identificación, correo, profesión o estado">

    </div>

    <div class="tabla-contenedor">

        <table>

            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Identificación</th>
                    <th>Correo</th>
                    <th>Profesión</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaParticipantes">
            </tbody>

        </table>

    </div>

</div>
</section>

</main>

<footer>
    <p>&copy; 2026 CENFOTEC Connect.</p>
</footer>

<script src="js/participantes.js"></script>

</body>
</html>
