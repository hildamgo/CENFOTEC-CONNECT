<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cenfotec Connect — Administración</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="site-header" role="banner">
        <div class="header-inner">
          <div class="brand">
            <img src = "assets/Images/Logo Oficial.jpeg" alt="Logo CENFOTEC Connect" class="logo" />
            <div>
              <h1 class="site-title">CENFOTEC Connect</h1>
              <nav class="menu">
                <a href="index.html">Inicio</a>
                <a href="espacios.html">Lugares</a>
                <a href="responsables.html">Responsables</a>
                <a href="actividad_lugar.html">Lugar de actividad</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="Seccion">
            <div class="contenedor">
                <h2>Lugar de actividad</h2>
                <p class="texto-ayuda">indicar si la actividad se realiza dentro o fuera del campus.</p>

                <form id="FormLugarActividad" class="formulario">
                    <label for="nombreActividad">Nombre de la Actividad</label>
                    <input type="text" id="nombreActividad" placeholder="Charla de Tecnologia">
                    <p class="mensaje-error" id="errorNombreActividad"></p>

                    <label for="tipoLugar">Tipo de Lugar</label>
                    <select id="tipoLugar">
                        <option value="">Seleccione una opcion</option>
                        <option value="interno">Dentro de la Universidad</option>
                        <option value="externo">Fuera de la Universidad</option>
                    </select>
                    <p class="mensaje-error" id="errorTipoLugar"></p>

                    <div id="grupoEspacioInterno" class="grupo-oculto">
                        <label for="lugarExterno">Lugar Externo</label>
                        <input type="text" id="lugarExterno" placeholder="Hotel, empresa, auditorio externo">
                    </div>

                    <button class="boton" type="submit">Guardar Lugar</button>
                </form>

                <div class="tarjeta resultado">
                    <h3>Ultimo Registro</h3>
                    <p id="resultadoLugar">No hay datos guardados.</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CENFOTEC Connect.</p>
    </footer>

    <script src="js/datos.js"></script>
    <script src="js/actividad_lugar.js"></script>
</body>
</html>
